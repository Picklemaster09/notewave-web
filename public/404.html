<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NoteWave</title>
<script>
  // GitHub Pages SPA redirect: on any 404, redirect to index with path in query string
  // so the React app can read it back and restore the correct route.
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    '/notewave-web/?/' +
    l.pathname.slice(1).replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
</html>
